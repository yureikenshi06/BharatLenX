<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MarketLens — F&O Trading Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #03050c; color: #dde4f5; font-family: 'DM Sans', -apple-system, sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #182040; border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: #1e2a54; }
    * { scrollbar-width: thin; scrollbar-color: #182040 transparent; }

    @keyframes fadeInUp  { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }
    @keyframes fadeIn    { from { opacity:0 } to { opacity:1 } }
    @keyframes scaleIn   { from { opacity:0; transform:scale(0.96) } to { opacity:1; transform:scale(1) } }
    @keyframes spin      { to { transform: rotate(360deg) } }
    @keyframes pulse     { 0%,100% { opacity:1 } 50% { opacity:0.55 } }

    .page-enter { animation: fadeInUp 0.25s ease both; }
    .card-enter { animation: scaleIn  0.2s ease both; }
    .dot-pulse  { animation: pulse 1.2s ease infinite; }

    .recharts-bar-rectangle:hover { filter: brightness(1.15); transition: filter 0.1s; }
    button { opacity: 1; transition: opacity 0.1s; }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
